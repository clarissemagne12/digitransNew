spring.application.name=digitransNew
server.port=8081

# Base de données (MySQL local)
spring.datasource.url=jdbc:mysql://localhost:3306/digitrans
spring.datasource.username=utilisateur
spring.datasource.password=utilisateur
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# JWT
jwt.secret=CamtechCrmSecretKey2026DigitransCM
jwt.expiration=86400000

# Security JWT properties (used by JwtConfig)
security.jwt.secret=CamtechCrmSecretKey2026DigitransCM
security.jwt.expiration=86400000

# Swagger
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html


